name: Trileaf CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install CPU-only torch first so pip doesn't pull the CUDA wheel
      # when it later processes requirements.txt (the constraint is already met).
      - name: Install CPU torch
        run: pip install "torch>=2.4.0" --index-url https://download.pytorch.org/whl/cpu

      - name: Install project + dev dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Build distribution wheel
        run: python -m pip wheel . --no-deps --no-build-isolation -w dist

      # ── Setup script syntax checks ────────────────────────────────────────
      - name: setup.sh syntax (Unix)
        if: runner.os != 'Windows'
        run: bash -n setup.sh

      - name: setup.sh executable bit
        if: runner.os != 'Windows'
        run: |
          mode=$(git ls-files -s setup.sh | awk '{print $1}')
          if [ "$mode" != "100755" ]; then
            echo "ERROR: setup.sh is not executable in git index (mode=$mode)"
            exit 1
          fi
          echo "setup.sh mode: $mode  ✓"

      - name: setup.ps1 syntax (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/setup.ps1", [ref]$null, [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
          Write-Host "setup.ps1 syntax OK"

      # ── Python test suite ─────────────────────────────────────────────────
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
