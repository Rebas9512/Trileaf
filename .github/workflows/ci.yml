name: Trileaf CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install CPU-only torch first so pip doesn't pull the CUDA wheel
      - name: Install CPU torch
        run: pip install "torch>=2.4.0" --index-url https://download.pytorch.org/whl/cpu

      - name: Install project + dev dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Build distribution wheel
        run: python -m pip wheel . --no-deps --no-build-isolation -w dist

      - name: Smoke-test wheel install
        shell: bash
        run: |
          pip install dist/*.whl --no-deps
          python -c "import trileaf_cli; print('wheel import OK')"
          python -c "from scripts import rewrite_config, check_env, chunker, orchestrator_v2, rule_detector, prompt_builder, post_processor, detector_interface; print('scripts import OK')"
          python -c "from scripts.rewrite_config import resolve_credentials, normalize_provider_id, get_provider_env_api_key_candidates; print('rewrite_config API OK')"

      - name: Verify leafhub.toml
        shell: bash
        run: |
          python -c "
          import sys, pathlib
          if sys.version_info >= (3, 11):
              import tomllib
          else:
              import tomli as tomllib
          m = tomllib.loads(pathlib.Path('leafhub.toml').read_text())
          assert m['project']['name'] == 'trileaf', f'name mismatch: {m[\"project\"][\"name\"]}'
          assert m['bindings'][0]['alias'] == 'rewrite', 'alias mismatch'
          print('leafhub.toml: valid')
          "

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  lint:
    name: Lint & syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Python syntax check
        run: find . -name '*.py' -not -path './.venv/*' | xargs python -m py_compile

      - name: Shell script syntax
        run: |
          for f in install.sh setup.sh; do
            [ -f "$f" ] && bash -n "$f" && echo "$f: syntax OK"
          done

      - name: setup.sh executable bit
        run: |
          mode=$(git ls-files -s setup.sh | awk '{print $1}')
          if [ "$mode" != "100755" ]; then
            echo "ERROR: setup.sh is not executable in git index (mode=$mode)"
            exit 1
          fi
          echo "setup.sh mode: $mode OK"

      - name: PS1 ASCII enforcement
        run: |
          for f in install.ps1 setup.ps1; do
            [ -f "$f" ] || continue
            if grep -Pq '[^\x00-\x7F]' "$f"; then
              echo "ERROR: $f contains non-ASCII characters"
              grep -Pn '[^\x00-\x7F]' "$f"
              exit 1
            fi
            echo "$f: ASCII OK"
          done

  ps1-syntax:
    name: PowerShell syntax check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Validate PS1 files
        shell: pwsh
        run: |
          foreach ($file in @("install.ps1", "setup.ps1")) {
            if (-not (Test-Path $file)) { continue }
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile(
              "$PWD/$file", [ref]$null, [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              exit 1
            }
            Write-Host "$file syntax OK"
          }
