name: Trileaf CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install CPU-only torch first so pip doesn't pull the CUDA wheel
      # when it later processes requirements.txt (the constraint is already met).
      - name: Install CPU torch
        run: pip install "torch>=2.4.0" --index-url https://download.pytorch.org/whl/cpu

      - name: Install project + dev dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Build distribution wheel
        run: python -m pip wheel . --no-deps --no-build-isolation -w dist

      - name: Smoke-test wheel install
        shell: bash
        run: |
          pip install dist/*.whl --no-deps
          python -c "import trileaf_cli; print('wheel import OK')"
          python -c "from scripts import rewrite_config, check_env, chunker, orchestrator; print('scripts import OK')"

      # ── Setup script syntax checks ────────────────────────────────────────
      - name: PS1 ASCII enforcement
        if: runner.os != 'Windows'
        run: |
          for f in install.ps1 setup.ps1; do
            [ -f "$f" ] || continue
            if grep -Pq '[^\x00-\x7F]' "$f"; then
              echo "ERROR: $f contains non-ASCII characters"
              grep -Pn '[^\x00-\x7F]' "$f"
              exit 1
            fi
            echo "$f: ASCII OK"
          done

      - name: Shell script syntax (Unix)
        if: runner.os != 'Windows'
        run: |
          bash -n install.sh
          bash -n setup.sh

      - name: setup.sh executable bit
        if: runner.os != 'Windows'
        run: |
          mode=$(git ls-files -s setup.sh | awk '{print $1}')
          if [ "$mode" != "100755" ]; then
            echo "ERROR: setup.sh is not executable in git index (mode=$mode)"
            exit 1
          fi
          echo "setup.sh mode: $mode  ✓"

      - name: PS1 syntax (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($file in @("setup.ps1", "install.ps1")) {
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile(
              "$PWD/$file", [ref]$null, [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              exit 1
            }
            Write-Host "$file syntax OK"
          }

      # ── Python test suite ─────────────────────────────────────────────────
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
