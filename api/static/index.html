<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trileaf V2</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg:      #0a0a0a;
      --panel:   #111111;
      --card:    #1a1a1a;
      --border:  #272738;
      --accent:  #a855f7;
      --accent2: #7c3aed;
      --green:   #4ade80;
      --red:     #f87171;
      --orange:  #fb923c;
      --yellow:  #fbbf24;
      --text:    #ffffff;
      --text-secondary: #a1a1aa;
      --muted:   #71717a;
      --radius:  8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* macOS-style scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
    * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }

    /* ── Header ──────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo { font-family: 'Geist', system-ui, sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); }
    .logo-sep { color: var(--muted); }
    .logo-sub { font-size: 13px; color: var(--muted); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .ws-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .ws-dot.connected { background: var(--green); }
    .ws-label { font-size: 12px; color: var(--muted); }

    /* ── Body layout ─────────────────────────────────────────────────── */
    .body { display: flex; flex: 1; overflow: hidden; }

    /* ── Left column: Input + Stages ─────────────────────────────────── */
    .left-col { display: flex; width: 620px; flex-shrink: 0; }

    .input-panel {
      display: flex;
      flex-direction: column;
      width: 320px;
      padding: 20px;
      gap: 16px;
      background: var(--panel);
      border-right: 1px solid var(--border);
    }
    .section-label {
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--muted);
    }
    #input-text {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      resize: none;
      outline: none;
    }
    #input-text::placeholder { color: rgba(113,113,122,0.5); }

    .mode-toggle {
      display: flex;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .mode-btn {
      flex: 1;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      cursor: pointer;
      background: var(--card);
      color: var(--text-secondary);
      border: none;
      transition: background 0.15s, color 0.15s;
    }
    .mode-btn.active {
      background: var(--accent);
      color: white;
      font-weight: 600;
    }

    .optimize-btn {
      height: 44px;
      border-radius: var(--radius);
      border: none;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      color: white;
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .optimize-btn:hover { opacity: 0.9; }
    .optimize-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .device-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: var(--radius);
      background: var(--card);
      font-size: 11px;
    }
    .device-bar .label { color: var(--muted); }
    .device-bar .value { font-family: 'Geist Mono', monospace; font-weight: 600; color: var(--text-secondary); }

    /* ── Stages panel ────────────────────────────────────────────────── */
    .stages-panel {
      display: flex;
      flex-direction: column;
      width: 300px;
      padding: 20px;
      gap: 12px;
      background: #0f0f14;
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }
    .stage-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--border);
    }
    .stage-card.active { border-color: rgba(168,85,247,0.2); }
    .stage-card.done { border-color: var(--border); }
    .stage-header { display: flex; align-items: center; gap: 8px; }
    .stage-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      flex-shrink: 0;
    }
    .stage-dot.done { background: var(--green); color: #0a0a0a; }
    .stage-dot.active { border: 2px solid var(--accent); background: transparent; }
    .stage-dot.waiting { background: var(--border); }
    .stage-dot.skipped { background: transparent; border: 1px dashed var(--muted); color: var(--muted); font-size: 12px; }
    .stage-name { font-family: 'Geist', system-ui, sans-serif; font-size: 12px; font-weight: 500; }
    .stage-name.done { color: white; }
    .stage-name.active { color: var(--accent); }
    .stage-name.waiting { color: var(--muted); }
    .stage-bar { height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; position: relative; }
    .stage-bar-fill { height: 100%; border-radius: 2px; transition: width 0.18s linear; width: 0%; }
    .stage-bar-fill.done { background: var(--green); }
    .stage-bar-fill.active { background: var(--accent); }
    .stage-bar-fill.active::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 24px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(168,85,247,0.4));
      animation: bar-shimmer 1.2s ease-in-out infinite;
    }
    @keyframes bar-shimmer {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .stage-metrics { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--muted); }
    .stage-metrics.active { color: rgba(168,85,247,0.7); }

    /* ── Right column: Analysis + Output ─────────────────────────────── */
    .right-col { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    .analysis-pane, .output-pane {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 20px;
      gap: 12px;
      overflow: hidden;
    }
    .analysis-pane { border-bottom: 1px solid var(--border); }

    .pane-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .legend { display: flex; gap: 12px; align-items: center; }
    .legend-item { display: flex; gap: 4px; align-items: center; font-size: 10px; color: var(--text-secondary); }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

    .pane-actions { display: flex; gap: 6px; }
    .pane-btn {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-secondary);
      font-size: 11px;
      cursor: pointer;
    }
    .pane-btn:hover { background: var(--border); }

    .text-scroll {
      flex: 1;
      padding: 16px;
      border-radius: var(--radius);
      background: var(--panel);
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.9;
      color: rgba(255,255,255,0.8);
    }
    .text-scroll .placeholder-msg {
      color: var(--muted);
      font-style: italic;
    }

    /* Inline highlights */
    .hl-critical { background: rgba(248,113,113,0.1); border-bottom: 2px solid rgba(248,113,113,0.7); border-radius: 3px; padding: 1px 0; }
    .hl-high { background: rgba(251,146,60,0.08); border-bottom: 2px solid rgba(251,146,60,0.7); border-radius: 3px; padding: 1px 0; }
    .hl-medium { background: rgba(251,191,36,0.08); border-bottom: 2px solid rgba(251,191,36,0.7); border-radius: 3px; padding: 1px 0; }
    .hl-unfixed {
      background: rgba(251,191,36,0.07);
      border-bottom: 2px solid rgba(251,191,36,0.7);
      border-radius: 3px;
      padding: 1px 0;
    }
    .unfixed-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(251,191,36,0.2);
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      color: var(--yellow);
      margin-left: 4px;
      vertical-align: middle;
    }

    /* Metrics row */
    .metrics-row { display: flex; gap: 8px; flex-shrink: 0; }
    .metric-card {
      flex: 1;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--border);
    }
    .metric-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
    .metric-value { display: flex; align-items: center; gap: 4px; }
    .metric-value .from { font-family: 'Geist Mono', monospace; font-size: 16px; font-weight: 600; color: var(--red); }
    .metric-value .arrow { font-size: 12px; color: var(--muted); }
    .metric-value .to { font-family: 'Geist Mono', monospace; font-size: 16px; font-weight: 600; color: var(--green); }
    .metric-value .pct { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--green); }
    .metric-value .single { font-family: 'Geist Mono', monospace; font-size: 16px; font-weight: 600; color: white; }
    .metric-value .s4-detail { font-family: 'Geist Mono', monospace; font-size: 10px; font-weight: 500; color: var(--yellow); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="logo">Trileaf</span>
      <span class="logo-sep">/</span>
      <span class="logo-sub">humanizer pipeline v2</span>
    </div>
    <div class="header-right">
      <span class="ws-dot" id="ws-dot"></span>
      <span class="ws-label" id="ws-label">Connecting...</span>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Left: Input + Stages -->
    <div class="left-col">

      <!-- Input panel -->
      <div class="input-panel">
        <div class="section-label">INPUT TEXT</div>
        <textarea id="input-text" placeholder="Paste the text you want to optimize here..."></textarea>
        <div class="mode-toggle">
          <button class="mode-btn active" id="mode-short-btn">Short Text</button>
          <button class="mode-btn" id="mode-long-btn">Long Text</button>
        </div>
        <button class="optimize-btn" id="run-btn">Optimize</button>
        <div class="device-bar">
          <span class="label">Device:</span>
          <span class="value" id="device-label">—</span>
          <span class="label">·</span>
          <span class="label">Rewrite:</span>
          <span class="value" id="rewrite-label">—</span>
        </div>
      </div>

      <!-- Stages panel -->
      <div class="stages-panel">
        <div class="section-label">PIPELINE STAGES</div>
        <div id="stages-container"></div>
      </div>

    </div>

    <!-- Right: Analysis + Output -->
    <div class="right-col">

      <!-- Sentence Analysis -->
      <div class="analysis-pane">
        <div class="pane-header">
          <div class="section-label">SENTENCE ANALYSIS</div>
          <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>Critical</div>
            <div class="legend-item"><div class="legend-dot" style="background:#fb923c"></div>High</div>
            <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>Medium</div>
            <div class="legend-item"><div class="legend-dot" style="background:#272738"></div>Clean</div>
          </div>
        </div>
        <div class="text-scroll" id="analysis-text">
          <span class="placeholder-msg">Analysis will appear here after you click Optimize.</span>
        </div>
      </div>

      <!-- Output -->
      <div class="output-pane">
        <div class="pane-header">
          <div class="section-label">OUTPUT</div>
          <div class="pane-actions">
            <button class="pane-btn" id="copy-btn">Copy</button>
          </div>
        </div>
        <div class="metrics-row" id="metrics-row" style="display:none">
          <div class="metric-card">
            <div class="metric-label">AI Score</div>
            <div class="metric-value" id="metric-ai"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Semantic</div>
            <div class="metric-value" id="metric-sem"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Violations</div>
            <div class="metric-value" id="metric-viol"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Stage 4</div>
            <div class="metric-value" id="metric-s4"></div>
          </div>
        </div>
        <div class="text-scroll" id="output-text">
          <span class="placeholder-msg">Optimized text will appear here.</span>
        </div>
      </div>

    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
